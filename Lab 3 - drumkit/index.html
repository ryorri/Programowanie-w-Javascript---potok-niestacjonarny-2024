<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drumkit</title>
</head>
<body>
    <audio src="./sounds/clap.wav" controls data-key="a" data-volume="40" id="clap"></audio>
    <audio src="./sounds/kick.wav" controls data-key="s" id="kick"></audio>
    <audio src="./sounds/hihat.wav" controls data-key="d" id="hihat"></audio>
    <audio src="./sounds/boom.wav" controls data-key="q" id="boom"></audio>
    <audio src="./sounds/openhat.wav" controls data-key="w" id="openhat"></audio>
    <audio src="./sounds/ride.wav" controls data-key="e" id="ride"></audio>
    <audio src="./sounds/snare.wav" controls data-key="z" id="snare"></audio>
    <audio src="./sounds/tink.wav" controls data-key="x" id="tink"></audio>
    <audio src="./sounds/tom.wav" controls data-key="c" id="tom"></audio>


    <button id="btn" onclick="myFunction()">Play</button>


    <script src="main.js"></script>
</body>
</html>
