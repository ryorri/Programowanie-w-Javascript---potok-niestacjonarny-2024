<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body
        {
            overflow-y: hidden;
            overflow-x: hidden;
        }
        .slider
        {
            position:absolute;
            left:0%;
            height: 510px;
            width: 100%;
            background-color: lightgrey;
        }
        .slide
        {
            height: 480px;
            width: 854px;
        }

        .dot 
        {
            cursor: pointer;
            height: 15px;
            width: 15px;
            margin: 5px 2px;
            background-color: #bbb;
            border-radius: 50%;
            display: inline-block;
            transition: background-color 0.6s ease;
        }

        .active, .dot:hover 
        {
            background-color: #717171;
        }

        .prev, .next
        {
            cursor: pointer;
            position: absolute;
            top:0;
            width: 400px;
            height: 395px;
            color: red;
            font-weight: bold;
            font-size: 200px;
            transition: 0.6s ease;
            border-radius: 0 3px 3px 0;
            user-select: none;
            text-align: center;
            padding-top: 100px;;
        }

        .next 
        {
            right: 0;
            border-radius: 3px 0 0 3px;
        }

        .prev:hover, .next:hover, .divzoom:hover
        {
            background-color: rgba(0,0,0,0.4);
        }

        .play
        {
            cursor: pointer;
            position: relative;
            top:80%;
            left: 47%;
            width: 600px;
            height: 410px;
            color: red;
            font-weight: bold;
            font-size: 200px;
            transition: 0.6s ease;
            border-radius: 0 3px 3px 0;
            user-select: none;
            text-align: center;
        }

        .zoom
        {
            position: relative;
            height: 50px;
            top:50%;
            left:50%;
        }

        .divzoom
        {
            position:absolute;
            top:0%;
            left:400px;
            height: 495px;
            width: 57vw;
        }

    </style>
</head>
<body>
    <main>
        <div class ="slider">
            
            <div class="slide">
                
            </div>
            
            <a class="prev" onclick="NextSlide(-1)">❮</a>
            <div class ="divzoom" onclick="Lightbox()"><img class="zoom" src="img/zoom.png"></img></div>
            <a class="next" onclick="NextSlide(1)">❯</a>
            

            <div style="text-align:center">
                <span class="dot" onclick="ShowSelectedSlide(0)"></span>
                <span class="dot" onclick="ShowSelectedSlide(1)"></span>
                <span class="dot" onclick="ShowSelectedSlide(2)"></span>
                <span class="dot" onclick="ShowSelectedSlide(3)"></span>
                <span class="dot" onclick="ShowSelectedSlide(4)"></span>
                <span class="dot" onclick="ShowSelectedSlide(5)"></span>
                <span class="dot" onclick="ShowSelectedSlide(6)"></span>
                <span class="dot" onclick="ShowSelectedSlide(7)"></span>
              </div>

              <div class="controls">
                <a class="play" onclick="StartPause()">⏯</a>
                <button class="ssss" onclick="Position()">Reverse</button>
              </div>
        </div>
    </main>

    <script src="script.js" type=""></script>
</body>
</html>
