<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kulki Projekt</title>
    <style>
        canvas {
            display: block;
            margin: 0 auto;
            background: #f0f0f0;
        }
        .controls {
            text-align: center;
            margin: 20px;
        }
    </style>
</head>
<body>
    <div class="controls">
        <label for="numBalls">Liczba kulek :</label>
        <input type="number" id="numBalls" value="50" min="1">
        <label for="distance">Odległość :</label>
        <input type="number" id="distance" value="100" min="10">
        <label for="attraction">Siła przyciągania:</label>
        <input type="number" id="attraction" value="1" min="1">
        <button id="startButton">Start</button>
        <button id="resetButton">Reset</button>
    </div>
    <canvas id="canvas" width="800" height="600"></canvas>
    <script src="index.js"></script>
</body>
</html>
